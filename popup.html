<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a202c;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header .icon { font-size: 24px; }
    .header .title { font-weight: 600; font-size: 15px; }
    .desc {
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .platform-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .platform-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #f8fafc;
      border-radius: 6px;
      font-size: 12px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    .shortcut {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      padding-top: 10px;
      border-top: 1px solid #f1f5f9;
    }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
    }
    .version {
      text-align: center;
      font-size: 10px;
      color: #cbd5e1;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">📑</span>
    <span class="title">AI Chat TOC</span>
  </div>
  <p class="desc">在 AI 对话页面右侧生成目录导航，支持快速跳转到任意问答。</p>
  <div class="platform-list">
    <div class="platform-item"><span class="dot"></span> ChatGPT (chatgpt.com)</div>
    <div class="platform-item"><span class="dot"></span> Claude (claude.ai)</div>
    <div class="platform-item"><span class="dot"></span> Gemini (gemini.google.com)</div>
  </div>
  <div class="shortcut">
    打开 AI 聊天页面后，侧边栏自动显示<br>
    点击右侧 📑 按钮可收起/展开
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
